<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ashik's Task Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --accent: #7c6fff;
      --accent-glow: rgba(124,111,255,0.18);
      --green: #36d399;
      --red: #f87272;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --border: rgba(255,255,255,0.07);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--text);
      line-height: 1.1;
    }
    .header h1 span {
      color: var(--accent);
    }
    .header .sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 600px;
      overflow: hidden;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .input-area input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input::placeholder { color: var(--muted); }
    .input-area input:focus { border-color: var(--accent); }
    .input-area button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .input-area button:hover { opacity: 0.85; }
    .input-area button:active { transform: scale(0.97); }

    /* Filter tabs */
    .filters {
      display: flex;
      padding: 14px 20px;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .filters button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filters button.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }
    .filters button:hover:not(.active) {
      border-color: var(--muted);
      color: var(--text);
    }
    .filters .count-badge {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      align-self: center;
    }

    /* Task list */
    .task-list {
      list-style: none;
      min-height: 60px;
    }
    .task-list .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface2); }

    /* Checkbox */
    .task-checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .task-checkbox:hover { border-color: var(--accent); }
    .task-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .task-checkbox.checked::after {
      content: '';
      width: 5px; height: 9px;
      border: 2px solid #0f0f13;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      display: block;
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
      transition: color 0.2s;
    }
    .task-text.done {
      color: var(--muted);
      text-decoration: line-through;
    }
    .task-text[contenteditable="true"] {
      outline: none;
      background: var(--surface2);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* Task actions */
    .task-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .task-item:hover .task-actions { opacity: 1; }
    .task-actions button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 7px;
      border-radius: 6px;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn-edit { color: var(--accent); }
    .btn-edit:hover { background: var(--accent-glow); }
    .btn-delete { color: var(--red); }
    .btn-delete:hover { background: rgba(248,114,114,0.12); }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--red);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(248,114,114,0.1); }

    /* Progress bar */
    .progress-wrap {
      margin-top: 16px;
      width: 100%;
      max-width: 600px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Author tag */
    .author {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .author span { color: var(--accent); }

    @media (max-width: 480px) {
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="eyebrow">JavaScript Logic & State Management</div>
    <h1>Ashik's <span>Task</span> Manager</h1>
    <div class="sub">Full CRUD · localStorage · Active / Completed filters</div>
  </div>

  <div class="card">
    <!-- Add task -->
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="200" />
      <button id="addBtn">Add Task</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="completed">Completed</button>
      <span class="count-badge" id="countBadge"></span>
    </div>

    <!-- Task list -->
    <ul class="task-list" id="taskList"></ul>

    <!-- Footer -->
    <div class="footer">
      <span id="remaining">0 tasks left</span>
      <button class="clear-btn" id="clearCompleted">Clear completed</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressLabel">0 / 0 done</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="author">Built by <span>Ashik Paul</span></div>

  <script>
    // ── State ──────────────────────────────────────────────
    const STORAGE_KEY = 'ashik_tasks_v1';
    let tasks = [];
    let currentFilter = 'all';
    let editingId = null;

    function load() {
      try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { tasks = []; }
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    // ── CRUD ───────────────────────────────────────────────
    function createTask(text) {
      return { id: Date.now().toString(), text: text.trim(), done: false, created: Date.now() };
    }
    function addTask(text) {
      if (!text.trim()) return;
      tasks.unshift(createTask(text));
      save(); render();
    }
    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }
    function updateTask(id, text) {
      const t = tasks.find(t => t.id === id);
      if (t && text.trim()) { t.text = text.trim(); save(); }
      editingId = null;
    }
    function clearCompleted() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    // ── Filter ─────────────────────────────────────────────
    function filtered() {
      if (currentFilter === 'active')    return tasks.filter(t => !t.done);
      if (currentFilter === 'completed') return tasks.filter(t => t.done);
      return tasks;
    }

    // ── Render ─────────────────────────────────────────────
    function render() {
      const list = document.getElementById('taskList');
      const vis  = filtered();

      if (vis.length === 0) {
        const msgs = {
          all: 'No tasks yet — add one above!',
          active: 'No active tasks. Well done!',
          completed: 'No completed tasks yet.'
        };
        list.innerHTML = `<li class="empty">${msgs[currentFilter]}</li>`;
      } else {
        list.innerHTML = '';
        vis.forEach(task => {
          const li = document.createElement('li');
          li.className = 'task-item';
          li.dataset.id = task.id;

          // Checkbox
          const cb = document.createElement('div');
          cb.className = 'task-checkbox' + (task.done ? ' checked' : '');
          cb.title = task.done ? 'Mark active' : 'Mark complete';
          cb.addEventListener('click', () => toggleTask(task.id));

          // Text
          const span = document.createElement('span');
          span.className = 'task-text' + (task.done ? ' done' : '');
          span.textContent = task.text;

          if (editingId === task.id) {
            span.contentEditable = 'true';
            span.focus();
            // Place cursor at end
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(span);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);

            span.addEventListener('keydown', e => {
              if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
              if (e.key === 'Escape') { editingId = null; render(); }
            });
            span.addEventListener('blur', () => {
              updateTask(task.id, span.textContent);
              render();
            });
          }

          // Actions
          const actions = document.createElement('div');
          actions.className = 'task-actions';

          const editBtn = document.createElement('button');
          editBtn.className = 'btn-edit';
          editBtn.title = 'Edit task';
          editBtn.textContent = '✏️';
          editBtn.addEventListener('click', () => {
            editingId = (editingId === task.id) ? null : task.id;
            render();
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-delete';
          delBtn.title = 'Delete task';
          delBtn.textContent = '🗑️';
          delBtn.addEventListener('click', () => deleteTask(task.id));

          actions.append(editBtn, delBtn);
          li.append(cb, span, actions);
          list.appendChild(li);
        });
      }

      // Counts
      const active = tasks.filter(t => !t.done).length;
      const total  = tasks.length;
      const done   = total - active;

      document.getElementById('remaining').textContent =
        active === 1 ? '1 task left' : `${active} tasks left`;
      document.getElementById('countBadge').textContent =
        `${vis.length} ${vis.length === 1 ? 'task' : 'tasks'}`;

      // Progress
      const pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${done} / ${total} done`;
    }

    // ── Event Listeners ────────────────────────────────────
    document.getElementById('addBtn').addEventListener('click', () => {
      const inp = document.getElementById('taskInput');
      addTask(inp.value);
      inp.value = '';
      inp.focus();
    });
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });

    document.querySelectorAll('.filters button[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filters button[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    document.getElementById('clearCompleted').addEventListener('click', clearCompleted);

    // ── Init ───────────────────────────────────────────────
    load();

    // Seed demo tasks if empty
    if (tasks.length === 0) {
      tasks = [
        { id: '1', text: 'Read the assignment brief carefully', done: true, created: Date.now() },
        { id: '2', text: 'Implement full CRUD functionality', done: true, created: Date.now() },
        { id: '3', text: 'Add localStorage persistence', done: true, created: Date.now() },
        { id: '4', text: 'Build All / Active / Completed filters', done: false, created: Date.now() },
        { id: '5', text: 'Test across browser reloads', done: false, created: Date.now() },
      ];
      save();
    }
    render();
  </script>
</body>
</html>
